<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DevWhisper — JS Tests</title>
  <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />
  <style>
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; }
    #mocha { margin: 0 auto; max-width: 860px; padding: 24px; }
    #mocha h1 a { color: #79c0ff; }
    #mocha h2 { color: #e6edf3; }
    #mocha .pass .title { color: #3fb950; }
    #mocha .fail .title { color: #f85149; }
    #mocha .fail pre  { color: #f85149; background: #161b22; padding: 8px; border-radius: 4px; }
    #mocha-stats .passes em { color: #3fb950; }
    #mocha-stats .failures em { color: #f85149; }
  </style>
</head>
<body>
  <div id="mocha"></div>

  <!-- Mocha and Chai from CDN — no npm required -->
  <script src="https://unpkg.com/mocha/mocha.js"></script>
  <script src="https://unpkg.com/chai/chai.js"></script>

  <script>
    mocha.setup({ ui: "bdd", timeout: 3000 });
    window.assert = chai.assert;
  </script>

  <!-- Test suites -->
  <script type="module" src="test-audio.js"></script>

  <script>
    // Give module scripts time to register their suites before running
    window.addEventListener("load", () => mocha.run());
  </script>
</body>
</html>
